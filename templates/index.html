<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prison Overcrowding Predictor</title>
    <style>
        /* ============================================
           LIGHT MODE (Default)
        ============================================ */
        :root {
            --bg-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --card-bg: white;
            --text-color: #333;
            --text-secondary: #666;
            --header-bg: linear-gradient(135deg, #1a1a2e, #2c3e50);
            --header-text: white;
            --border-color: #ddd;
            --facility-bg: #f8f9fa;
            --facility-hover: #e8f0fe;
            --footer-bg: #f8f9fa;
            --result-overcrowded-bg: #fee2e2;
            --result-overcrowded-border: #ef4444;
            --result-safe-bg: #dcfce7;
            --result-safe-border: #22c55e;
            --error-bg: #fee2e2;
            --error-text: #ef4444;
            --select-bg: white;
            --select-text: #333;
            --toggle-bg: #ccc;
            --toggle-knob: white;
        }
        
        /* ============================================
           DARK MODE
        ============================================ */
        body.dark-mode {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: #1e293b;
            --text-color: #e2e8f0;
            --text-secondary: #94a3b8;
            --header-bg: linear-gradient(135deg, #0f0f1a, #1a1a2e);
            --header-text: #e2e8f0;
            --border-color: #334155;
            --facility-bg: #334155;
            --facility-hover: #475569;
            --footer-bg: #0f172a;
            --result-overcrowded-bg: #450a0a;
            --result-overcrowded-border: #ef4444;
            --result-safe-bg: #052e16;
            --result-safe-border: #22c55e;
            --error-bg: #450a0a;
            --error-text: #f87171;
            --select-bg: #334155;
            --select-text: #e2e8f0;
            --toggle-bg: #4a5568;
            --toggle-knob: #e2e8f0;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
        }
        
        .container { max-width: 800px; margin: 0 auto; }
        
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            transition: background 0.3s ease;
        }
        
        .header {
            background: var(--header-bg);
            color: var(--header-text);
            padding: 30px;
            text-align: center;
            position: relative;
            transition: background 0.3s ease;
        }
        
        /* ============================================
           SLIDING TOGGLE SWITCH
        ============================================ */
        .theme-switch-wrapper {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .theme-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }
        
        .theme-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--toggle-bg);
            transition: 0.3s;
            border-radius: 30px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 24px;
            width: 24px;
            left: 3px;
            bottom: 3px;
            background-color: var(--toggle-knob);
            transition: 0.3s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #22c55e;
        }
        
        input:checked + .slider:before {
            transform: translateX(30px);
        }
        
        .theme-label {
            font-size: 12px;
            color: var(--header-text);
            opacity: 0.8;
        }
        
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { font-size: 14px; opacity: 0.8; }
        
        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
        }
        
        .content { padding: 30px; }
        .form-group { margin-bottom: 25px; }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-color);
        }
        
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 16px;
            background: var(--select-bg);
            color: var(--select-text);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        select:focus { outline: none; border-color: #2a5298; }
        select:disabled { opacity: 0.6; cursor: not-allowed; }
        
        /* Facility Cards */
        .facility-card {
            background: var(--facility-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            color: var(--text-color);
        }
        
        .facility-card:hover {
            border-color: #2a5298;
            transform: translateX(5px);
            background: var(--facility-hover);
        }
        
        .facility-card.selected { border-color: #22c55e; background: var(--facility-hover); }
        .facility-name { font-weight: bold; font-size: 16px; margin-bottom: 8px; }
        .facility-details { font-size: 13px; display: flex; gap: 15px; flex-wrap: wrap; }
        .facility-details span { background: var(--card-bg); padding: 2px 8px; border-radius: 15px; }
        
        .loading { text-align: center; padding: 30px; color: var(--text-secondary); }
        .empty-message { text-align: center; padding: 30px; color: var(--text-secondary); }
        
        /* Results */
        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        
        .result.overcrowded { background: var(--result-overcrowded-bg); border: 2px solid var(--result-overcrowded-border); }
        .result.safe { background: var(--result-safe-bg); border: 2px solid var(--result-safe-border); }
        
        .prediction-text { font-size: 28px; font-weight: bold; margin-bottom: 15px; }
        .overcrowded .prediction-text { color: #ef4444; }
        .safe .prediction-text { color: #22c55e; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }
        
        .stat { text-align: center; }
        .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; }
        .stat-value { font-size: 20px; font-weight: bold; color: var(--text-color); }
        
        .error { background: var(--error-bg); color: var(--error-text); padding: 15px; border-radius: 10px; text-align: center; }
        .hidden { display: none; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .footer {
            background: var(--footer-bg);
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            transition: background 0.3s ease;
        }
        
        .result-loading { text-align: center; padding: 20px; color: var(--text-secondary); }
        
        /* Sun and Moon Icons */
        .light-icon, .dark-icon {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="theme-switch-wrapper">
                    <span class="light-icon">☀️</span>
                    <label class="theme-switch">
                        <input type="checkbox" id="theme-toggle-checkbox">
                        <span class="slider"></span>
                    </label>
                    <span class="dark-icon">🌙</span>
                </div>
                <h1>🏛️ Prison Overcrowding Predictor</h1>
                <p>Search for a prison by location and check overcrowding status</p>
                <div class="badge">Powered by Random Forest | AI/ML Project</div>
            </div>
            
            <div class="content">
                <div class="form-group">
                    <label>📍 Step 1: Select State</label>
                    <select id="state" onchange="onStateChange()">
                        <option value="">-- Select State --</option>
                        {% for state in states %}
                        <option value="{{ state }}">{{ state }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label>🏙️ Step 2: Select City</label>
                    <select id="city" onchange="onCityChange()" disabled>
                        <option value="">-- Select State First --</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>🏛️ Step 3: Select Facility</label>
                    <div id="facilitiesList">
                        <div class="empty-message">Select a state and city to view facilities</div>
                    </div>
                </div>
                
                <div id="resultSection" class="hidden"></div>
            </div>
            
            <div class="footer">
                AI/ML Project | Prison Overcrowding Prediction System
            </div>
        </div>
    </div>
    
    <script>
        // ============================================
        // SLIDING TOGGLE - DARK/LIGHT MODE
        // ============================================
        const toggleSwitch = document.getElementById('theme-toggle-checkbox');
        
        // Function to set theme
        function setTheme(isDark) {
            if (isDark) {
                document.body.classList.add('dark-mode');
                toggleSwitch.checked = true;
                localStorage.setItem('darkMode', 'true');
            } else {
                document.body.classList.remove('dark-mode');
                toggleSwitch.checked = false;
                localStorage.setItem('darkMode', 'false');
            }
        }
        
        // Load saved theme preference
        const savedTheme = localStorage.getItem('darkMode');
        if (savedTheme === 'true') {
            setTheme(true);
        } else {
            setTheme(false);
        }
        
        // Listen for toggle changes
        toggleSwitch.addEventListener('change', function(e) {
            setTheme(e.target.checked);
        });
        
        // ============================================
        // CLEAR RESULTS
        // ============================================
        function clearResults() {
            const resultSection = document.getElementById('resultSection');
            resultSection.classList.add('hidden');
            resultSection.innerHTML = '';
            document.querySelectorAll('.facility-card').forEach(card => card.classList.remove('selected'));
        }
        
        // ============================================
        // DISPLAY PREDICTION RESULT
        // ============================================
        function displayResult(data) {
            const resultSection = document.getElementById('resultSection');
            resultSection.innerHTML = `
                <div class="result ${data.result_class}">
                    <div class="prediction-text">${data.prediction}</div>
                    <div style="margin-bottom: 10px;">
                        🏛️ <strong>${data.facility_name}</strong><br>
                        📍 ${data.facility_city}, ${data.facility_state} | 🆔 ID: ${data.facility_id}
                    </div>
                    <div class="stats">
                        <div class="stat"><div class="stat-label">Population</div><div class="stat-value">${data.population}</div></div>
                        <div class="stat"><div class="stat-label">Capacity</div><div class="stat-value">${data.capacity}</div></div>
                        <div class="stat"><div class="stat-label">Available Slots</div><div class="stat-value">${data.available_slots}</div></div>
                        <div class="stat"><div class="stat-label">Utilization</div><div class="stat-value">${data.utilization}%</div></div>
                    </div>
                </div>
            `;
            resultSection.classList.remove('hidden');
        }
        
        // ============================================
        // STATE & CITY HANDLERS
        // ============================================
        function onStateChange() { clearResults(); loadCities(); }
        function onCityChange() { clearResults(); loadFacilities(); }
        
        function loadCities() {
            const state = document.getElementById('state').value;
            const citySelect = document.getElementById('city');
            const facilitiesDiv = document.getElementById('facilitiesList');
            if (!state) {
                citySelect.disabled = true;
                citySelect.innerHTML = '<option value="">-- Select State First --</option>';
                facilitiesDiv.innerHTML = '<div class="empty-message">Select a state and city to view facilities</div>';
                return;
            }
            fetch('/get_cities', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({state: state})
            })
            .then(res => res.json())
            .then(data => {
                citySelect.disabled = false;
                citySelect.innerHTML = '<option value="">-- Select City --</option>';
                data.cities.forEach(city => citySelect.innerHTML += `<option value="${city}">${city}</option>`);
                facilitiesDiv.innerHTML = '<div class="empty-message">Select a city to view facilities</div>';
            });
        }
        
        function loadFacilities() {
            const state = document.getElementById('state').value;
            const city = document.getElementById('city').value;
            const facilitiesDiv = document.getElementById('facilitiesList');
            if (!state || !city) return;
            facilitiesDiv.innerHTML = '<div class="loading">Loading facilities...</div>';
            fetch('/get_facilities', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({state: state, city: city})
            })
            .then(res => res.json())
            .then(data => {
                if (data.facilities.length === 0) {
                    facilitiesDiv.innerHTML = '<div class="empty-message">No facilities found in this city</div>';
                    return;
                }
                facilitiesDiv.innerHTML = '';
                data.facilities.forEach(facility => {
                    const statusText = facility.is_overcrowded ? '🔴 OVERCROWDED' : '🟢 NOT overcrowded';
                    const div = document.createElement('div');
                    div.className = 'facility-card';
                    div.innerHTML = `
                        <div class="facility-name">🏛️ ${facility.name}</div>
                        <div class="facility-details">
                            <span>👥 Population: ${facility.population.toLocaleString()}</span>
                            <span>🏠 Capacity: ${facility.capacity.toLocaleString()}</span>
                            <span>📊 Available: ${facility.available_slots.toLocaleString()}</span>
                            <span>${statusText}</span>
                        </div>
                    `;
                    div.onclick = (function(f) { return function() { getPrediction(f); }; })(facility);
                    facilitiesDiv.appendChild(div);
                });
            });
        }
        
        // ============================================
        // GET PREDICTION
        // ============================================
        function getPrediction(facility) {
            const resultSection = document.getElementById('resultSection');
            resultSection.innerHTML = '<div class="result-loading">🔮 Getting prediction...</div>';
            resultSection.classList.remove('hidden');
            
            document.querySelectorAll('.facility-card').forEach(card => card.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            
            fetch('/predict_ajax', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    facility_id: facility.id,
                    population: facility.population,
                    capacity: facility.capacity
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    displayResult(data);
                } else {
                    resultSection.innerHTML = `<div class="error">⚠️ ${data.error}</div>`;
                }
            })
            .catch(() => resultSection.innerHTML = '<div class="error">⚠️ Error getting prediction</div>');
        }
    </script>
</body>
</html>
